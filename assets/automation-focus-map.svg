<svg width="860" height="235" viewBox="0 0 860 235" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Automation and product systems focus map</title>
  <desc id="desc">A local profile card describing Denis Kolesnikov's work focus: business analysis, AI workflows, and full-stack automation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="0.55" stop-color="#101820"/>
      <stop offset="1" stop-color="#0f1b2d"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="0.5" stop-color="#2ea043"/>
      <stop offset="1" stop-color="#a371f7"/>
    </linearGradient>
  </defs>

  <rect width="860" height="235" rx="18" fill="url(#bg)"/>
  <rect x="1" y="1" width="858" height="233" rx="17" fill="none" stroke="#30363d"/>

  <text x="34" y="43" fill="#f0f6fc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="23" font-weight="700">What I Build With AI</text>
  <text x="34" y="70" fill="#8b949e" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">Business process → operating model → automation → dashboard → audit</text>
  <rect x="34" y="84" width="792" height="1" fill="url(#line)" opacity="0.6"/>

  <g transform="translate(34 108)">
    <rect x="0" y="0" width="242" height="88" rx="12" fill="#161b22" stroke="#30363d"/>
    <circle cx="31" cy="30" r="12" fill="#58a6ff" opacity="0.2"/>
    <circle cx="31" cy="30" r="5" fill="#58a6ff"/>
    <text x="56" y="35" fill="#f0f6fc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Business analysis</text>
    <text x="22" y="62" fill="#8b949e" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">Discovery · process maps · acceptance criteria</text>
  </g>

  <g transform="translate(309 108)">
    <rect x="0" y="0" width="242" height="88" rx="12" fill="#161b22" stroke="#30363d"/>
    <circle cx="31" cy="30" r="12" fill="#2ea043" opacity="0.2"/>
    <circle cx="31" cy="30" r="5" fill="#2ea043"/>
    <text x="56" y="35" fill="#f0f6fc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">AI workflow systems</text>
    <text x="22" y="62" fill="#8b949e" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">Queues · HITL review · MCP tools · fallback</text>
  </g>

  <g transform="translate(584 108)">
    <rect x="0" y="0" width="242" height="88" rx="12" fill="#161b22" stroke="#30363d"/>
    <circle cx="31" cy="30" r="12" fill="#a371f7" opacity="0.2"/>
    <circle cx="31" cy="30" r="5" fill="#a371f7"/>
    <text x="56" y="35" fill="#f0f6fc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Full-stack automation</text>
    <text x="22" y="62" fill="#8b949e" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">FastAPI · PostgreSQL · Docker · React UI</text>
  </g>

  <path d="M276 152 C288 152 294 152 309 152" stroke="#58a6ff" stroke-width="2" stroke-dasharray="5 6" fill="none"/>
  <path d="M551 152 C563 152 569 152 584 152" stroke="#2ea043" stroke-width="2" stroke-dasharray="5 6" fill="none"/>

  <text x="34" y="218" fill="#8b949e" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">Local SVG asset: no third-party stats service, no API limit, no private data.</text>
</svg>
