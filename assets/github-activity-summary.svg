<svg width="860" height="260" viewBox="0 0 860 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Public GitHub activity summary</title>
  <desc id="desc">Local SVG showing public GitHub activity for Denis Kolesnikov without third-party stats widgets.</desc>
