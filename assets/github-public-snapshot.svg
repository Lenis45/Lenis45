<svg width="860" height="235" viewBox="0 0 860 235" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Public GitHub snapshot for Denis Kolesnikov</title>
  <desc id="desc">A local profile card showing public repositories, proof projects, shared agent skills, and language focus.</desc>
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#2ea043"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-10%" width="110%" height="120%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#010409" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="860" height="235" rx="18" fill="url(#card)" filter="url(#shadow)"/>
  <rect x="1" y="1" width="858" height="233" rx="17" fill="none" stroke="#30363d"/>

  <text x="34" y="42" fill="#f0f6fc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="23" font-weight="700">Public GitHub Snapshot</text>
  <text x="34" y="69" fill="#8b949e" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">Stable local card · public repositories only · private commercial work excluded</text>

  <g transform="translate(34 94)">
    <rect x="0" y="0" width="170" height="86" rx="12" fill="#161b22" stroke="#30363d"/>
    <text x="22" y="36" fill="#58a6ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="800">7</text>
    <text x="22" y="62" fill="#c9d1d9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">public repos</text>
  </g>

  <g transform="translate(224 94)">
    <rect x="0" y="0" width="185" height="86" rx="12" fill="#161b22" stroke="#30363d"/>
    <text x="22" y="36" fill="#2ea043" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="800">5</text>
    <text x="22" y="62" fill="#c9d1d9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">proof projects</text>
  </g>

  <g transform="translate(429 94)">
    <rect x="0" y="0" width="205" height="86" rx="12" fill="#161b22" stroke="#30363d"/>
    <text x="22" y="36" fill="#a371f7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="800">17</text>
    <text x="22" y="62" fill="#c9d1d9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">shared agent skills</text>
  </g>

  <g transform="translate(654 94)">
    <rect x="0" y="0" width="172" height="86" rx="12" fill="#161b22" stroke="#30363d"/>
    <text x="22" y="36" fill="#58a6ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="800">2026</text>
    <text x="22" y="62" fill="#c9d1d9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">active build year</text>
  </g>

  <text x="34" y="208" fill="#8b949e" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">Language focus</text>
  <rect x="143" y="197" width="320" height="10" rx="5" fill="#21262d"/>
  <rect x="143" y="197" width="203" height="10" rx="5" fill="#58a6ff"/>
  <rect x="346" y="197" width="53" height="10" fill="#f1e05a"/>
  <rect x="399" y="197" width="46" height="10" fill="#e34c26"/>
  <rect x="445" y="197" width="18" height="10" rx="5" fill="#89e051"/>

  <text x="486" y="208" fill="#c9d1d9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">Python · JavaScript · HTML · Shell · CSS</text>
  <rect x="34" y="82" width="792" height="1" fill="url(#blue)" opacity="0.45"/>
</svg>
