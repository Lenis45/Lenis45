<svg width="860" height="118" viewBox="0 0 860 118" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Role focus badges</title>
  <desc id="desc">Business Analysis, Automation, and AI Systems role badges.</desc>
  <defs>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#1f6feb"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2ea043"/>
      <stop offset="1" stop-color="#238636"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a371f7"/>
      <stop offset="1" stop-color="#6b46c1"/>
    </linearGradient>
  </defs>
  <rect width="860" height="118" rx="0" fill="#ffffff" fill-opacity="0"/>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="middle">
    <rect x="28" y="18" width="256" height="82" rx="14" fill="url(#blue)"/>
    <text x="156" y="52" fill="#ffffff" font-size="18" font-weight="800">Business Analysis</text>
    <text x="156" y="78" fill="#e6f2ff" font-size="14" font-weight="600">process to system</text>

    <rect x="302" y="18" width="256" height="82" rx="14" fill="url(#green)"/>
    <text x="430" y="52" fill="#ffffff" font-size="18" font-weight="800">Automation</text>
    <text x="430" y="78" fill="#e7f8ec" font-size="14" font-weight="600">workflows and ops</text>

    <rect x="576" y="18" width="256" height="82" rx="14" fill="url(#purple)"/>
    <text x="704" y="52" fill="#ffffff" font-size="18" font-weight="800">AI Systems</text>
    <text x="704" y="78" fill="#f0e8ff" font-size="14" font-weight="600">HITL and audit</text>
  </g>
</svg>
